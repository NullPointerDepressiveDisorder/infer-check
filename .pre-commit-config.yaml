repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  # Ruff — lint + format in one pass
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.5.0
          - numpy>=1.26.0
          - click>=8.1.0
          - httpx>=0.27.0
          - types-jinja2
          - mlx-lm<0.31.0
        args: ["--strict", "--ignore-missing-imports"]
        pass_filenames: false
        entry: mypy src/infer_check/

  # Validate JSONL prompt suites
  - repo: local
    hooks:
      - id: validate-prompt-suites
        name: validate prompt suite JSONL
        entry: python
        args:
          - -c
          - |
            import json, sys, pathlib
            errors = []
            for f in pathlib.Path('prompt-suites').glob('*.jsonl'):
                for i, line in enumerate(f.read_text().splitlines(), 1):
                    if not line.strip():
                        continue
                    try:
                        obj = json.loads(line)
                        assert 'text' in obj, 'missing text field'
                    except Exception as e:
                        errors.append(f'{f}:{i}: {e}')
            if errors:
                print('\n'.join(errors), file=sys.stderr)
                sys.exit(1)
        language: python
        files: 'prompt-suites/.*\.jsonl$'
        pass_filenames: false
